# Full stack: MongoDB + Express API + React (nginx).
# API is a normal long-running Node server — not serverless.
#
#   docker compose up -d --build
#   Frontend: http://localhost:3000
#   API:      http://localhost:5000
#   Swagger:  http://localhost:5000/api/docs

services:
  mongodb:
    image: mongo:7
    container_name: pnmc-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}

  backend:
    build: ./backend
    container_name: pnmc-api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/pnmc?authSource=admin
      FRONTEND_URL: http://localhost:3000
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-cloudinary}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      PAYMENTS_ENABLED: ${PAYMENTS_ENABLED:-false}
    depends_on:
      - mongodb
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/health']
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: pnmc-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongodb_data:
