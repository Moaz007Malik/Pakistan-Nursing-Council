# Optional: MongoDB only for local development (not needed for Vercel — use MongoDB Atlas)
services:
  mongodb:
    image: mongo:7
    container_name: pnmc-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}

volumes:
  mongodb_data:
