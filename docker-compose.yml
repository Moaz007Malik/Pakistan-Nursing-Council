version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: pnmc-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
    networks:
      - pnmc-network

  minio:
    image: minio/minio:latest
    container_name: pnmc-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    networks:
      - pnmc-network

  redis:
    image: redis:7-alpine
    container_name: pnmc-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - pnmc-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pnmc-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/pnmc?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-key}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: pnmc-documents
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost
    depends_on:
      - mongodb
      - minio
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - pnmc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pnmc-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - pnmc-network

  nginx:
    image: nginx:alpine
    container_name: pnmc-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - pnmc-network

volumes:
  mongodb_data:
  minio_data:

networks:
  pnmc-network:
    driver: bridge
