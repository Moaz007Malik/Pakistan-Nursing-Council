# Render Blueprint — deploy from the backend folder repo root.
# Dashboard → New → Blueprint, or Web Service with root = this directory.

services:
  - type: web
    name: pnmc-api
    runtime: node
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_PROVIDER
        value: cloudinary
      - key: PAYMENTS_ENABLED
        value: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
