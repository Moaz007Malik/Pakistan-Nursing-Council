[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Express API (MongoDB, auth, etc.)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  framework = "#custom"
